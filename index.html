<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neuro-Score — Острый ишемический инсульт</title>
<meta name="description" content="Пошаговый клинический опросник для принятия решений при ОИИ. AHA/ASA 2026.">
<meta property="og:title" content="Neuro-Score AIS">
<meta property="og:description" content="Клинический алгоритм ведения острого ишемического инсульта">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020b18;--bg2:#0d1f35;--bg3:#0f172a;
  --border:#1e3a5f;--border2:#1e293b;--border3:#334155;
  --t1:#f1f5f9;--t2:#94a3b8;--t3:#64748b;--t4:#475569;--t5:#334155;
  --teal:#0EA5C9;--teal2:#0B6E8F;--teal3:#7DD3FC;
  --red:#DC2626;--green:#16A34A;--amber:#F59E0B;--purple:#7C3AED;--rose:#E11D48;
  --sans:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
}
html,body{background:var(--bg);color:var(--t1);font-family:var(--sans);min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;background:var(--border2);border-radius:3px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 3px rgba(14,165,201,.22);cursor:pointer;transition:transform .15s}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15)}
input[type=number]{background:var(--bg3);border:2px solid var(--border2);border-radius:12px;color:var(--t1);font-family:var(--mono);font-size:26px;padding:13px 18px;width:190px;text-align:center;outline:none;transition:border-color .2s}
input[type=number]:focus{border-color:var(--teal)}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=text]{background:var(--bg3);border:2px solid var(--border2);border-radius:10px;color:var(--t1);font-family:var(--sans);font-size:15px;padding:11px 14px;outline:none;transition:border-color .2s;width:100%}
input[type=text]:focus{border-color:var(--teal)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 6px var(--teal)}50%{box-shadow:0 0 16px var(--teal)}}
@keyframes spin{to{transform:rotate(360deg)}}
.au{animation:fadeUp .22s ease forwards}.ad{animation:fadeDown .22s ease forwards}
.shell{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 56px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;box-shadow:0 24px 64px rgba(0,0,0,.55);overflow:hidden;width:100%;max-width:560px}
.progress-bar{height:3px;background:var(--border2)}.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal2),var(--teal));transition:width .4s ease}
.card-body{padding:28px 32px}
.topbar{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:560px;margin-bottom:20px}
.logo-wrap{display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);animation:glow 2.5s infinite}
.logo-txt{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--teal)}
.logo-sub{font-size:11px;color:var(--t3);margin-top:2px}
.step-dots{display:flex;gap:4px;align-items:center}
.sdot{height:5px;border-radius:3px;background:var(--border2);transition:all .3s}
.q-badge{display:inline-flex;align-items:center;background:rgba(14,165,201,.1);border:1px solid rgba(14,165,201,.2);border-radius:20px;padding:3px 11px;margin-bottom:10px}
.q-num{color:var(--teal);font-size:11px;font-weight:700;letter-spacing:.5px}
.q-title{color:var(--t1);font-size:20px;font-weight:700;line-height:1.35;margin-bottom:7px}
.q-hint{color:var(--t4);font-size:13px;line-height:1.55;margin-bottom:22px}
.choices-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:22px}
.choices-col{display:flex;flex-direction:column;gap:9px;margin-bottom:22px}
.cbtn{display:flex;align-items:center;gap:11px;padding:12px 14px;border-radius:12px;border:2px solid var(--border2);background:var(--bg3);color:var(--t2);font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;text-align:left;transition:border-color .15s,background .15s,color .15s;width:100%}
.cbtn:hover{border-color:var(--border3);color:var(--t1)}.cbtn.active{border-color:var(--teal);background:rgba(14,165,201,.1);color:var(--teal3)}
.cbtn .ico{font-size:17px;flex-shrink:0}.cbtn .sel{margin-left:auto;color:var(--teal);font-size:11px}
.score-wrap{display:flex;flex-direction:column;align-items:center;gap:13px;margin-bottom:22px}
.score-box{border-radius:16px;padding:15px 40px;text-align:center;border:2px solid transparent;transition:background .3s,border-color .3s}
.score-num{font-family:var(--mono);font-size:50px;font-weight:700;line-height:1;transition:color .3s}
.score-lbl{font-size:12px;font-weight:600;margin-top:3px;transition:color .3s;letter-spacing:.5px}
.quick-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.qbtn{padding:4px 11px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all .15s}
.qbtn:hover{border-color:var(--border3);color:var(--t1)}.qbtn.active{background:rgba(14,165,201,.15);border-color:var(--teal);color:var(--teal3)}
.bp-box{border-radius:16px;padding:13px 26px;text-align:center;border:2px solid transparent;transition:all .3s;margin-bottom:16px}
.bp-nums{display:flex;align-items:center;justify-content:center;gap:7px}
.bp-val{font-family:var(--mono);font-size:42px;font-weight:700;transition:color .3s}
.bp-sep{font-size:30px;color:var(--t4);font-weight:300}.bp-unit{font-size:12px;color:var(--t3);align-self:flex-end;padding-bottom:5px;margin-left:3px}
.bp-status{font-size:13px;font-weight:600;margin-top:3px}
.sliders-row{display:flex;gap:20px;margin-bottom:22px}
.sl-group{flex:1}.sl-lbl{font-size:10px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;display:block}
.sl-range{display:flex;justify-content:space-between;font-size:10px;color:var(--t3);margin-top:3px}
.num-wrap{display:flex;flex-direction:column;align-items:center;gap:9px;margin-bottom:22px}
.num-unit{color:var(--t3);font-size:13px}
.chklist{display:flex;flex-direction:column;gap:7px;margin-bottom:22px}
.ch-count{color:var(--t3);font-size:12px;margin-bottom:3px}
.chitem{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:10px;border:1px solid var(--border2);background:var(--bg3);color:var(--t2);font-size:13px;cursor:pointer;text-align:left;font-family:var(--sans);transition:all .15s;width:100%}
.chitem:hover{border-color:var(--border3)}.chitem.chk{border-color:var(--red);background:rgba(220,38,38,.1);color:#fca5a5}
.chitem.chk-amber{border-color:var(--amber);background:rgba(245,158,11,.1);color:#fcd34d}
.checkbox{width:17px;height:17px;border-radius:4px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:10px;color:#fff}
.chitem.chk .checkbox{background:var(--red);border-color:var(--red)}
.chitem.chk-amber .checkbox{background:var(--amber);border-color:var(--amber)}
/* BMI */
.bmi-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.bmi-field{display:flex;flex-direction:column;align-items:center;gap:7px}
.bmi-lbl{font-size:11px;color:var(--t3);letter-spacing:1px;text-transform:uppercase}
.bmi-input{background:var(--bg3);border:2px solid var(--border2);border-radius:12px;color:var(--t1);font-family:var(--mono);font-size:26px;padding:12px 16px;width:100%;text-align:center;outline:none;transition:border-color .2s}
.bmi-input:focus{border-color:var(--teal)}.bmi-input::-webkit-inner-spin-button{-webkit-appearance:none}
.bmi-unit{font-size:12px;color:var(--t3)}
.bmi-result{border-radius:14px;padding:14px 24px;text-align:center;margin-bottom:18px;border:2px solid transparent;transition:all .3s}
.bmi-val{font-family:var(--mono);font-size:44px;font-weight:700;line-height:1}
.bmi-cat{font-size:13px;font-weight:600;margin-top:3px}
.bmi-extra{font-size:12px;color:var(--t3);margin-top:4px}
/* Meta */
.meta-row{display:flex;gap:10px;margin-bottom:22px}
.meta-f{flex:1}.meta-lbl{font-size:11px;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px;display:block}
/* Warn */
.warn{border-radius:10px;padding:9px 13px;font-size:13px;margin-bottom:10px;line-height:1.5}
.warn-r{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.35);color:#fca5a5}
.warn-a{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.35);color:#fcd34d}
.warn-g{background:rgba(22,163,74,.1);border:1px solid rgba(22,163,74,.35);color:#86efac}
.warn-p{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.35);color:#c4b5fd}
/* Nav */
.nav-row{display:flex;gap:10px;margin-top:4px}
.btn-back{padding:12px 16px;border-radius:12px;border:1px solid var(--border2);background:transparent;color:var(--t3);font-size:14px;cursor:pointer;font-family:var(--sans);font-weight:600;transition:color .15s,border-color .15s}
.btn-back:hover{color:var(--t2);border-color:var(--border3)}
.btn-next{flex:1;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--teal2),var(--teal));color:#fff;font-size:15px;cursor:pointer;font-family:var(--sans);font-weight:700;box-shadow:0 4px 20px rgba(14,165,201,.35);transition:transform .15s,box-shadow .15s}
.btn-next:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(14,165,201,.45)}.btn-next:active{transform:translateY(0)}
.btn-next:disabled{background:var(--border2);color:var(--t5);box-shadow:none;cursor:not-allowed;transform:none}
/* Decision */
.dec-header{border-radius:16px;padding:20px 22px;margin-bottom:13px;border:2px solid transparent}
.dec-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:13px}
.dec-dot{width:11px;height:11px;border-radius:50%;margin-top:5px;flex-shrink:0}
.dec-title{font-size:22px;font-weight:800;line-height:1.2}.dec-sub{color:var(--t4);font-size:13px;margin-top:3px}
.urg-badge{margin-left:auto;font-size:10px;font-weight:700;padding:4px 9px;border-radius:20px;letter-spacing:1px;white-space:nowrap;flex-shrink:0}
.actions{display:flex;flex-direction:column;gap:7px}
.act-item{display:flex;align-items:flex-start;gap:10px;background:rgba(0,0,0,.3);border-radius:10px;padding:10px 13px}
.act-num{font-size:10px;font-weight:800;padding:2px 6px;border-radius:6px;white-space:nowrap;margin-top:1px;flex-shrink:0;font-family:var(--mono)}
.act-txt{color:var(--t1);font-size:13px;line-height:1.55}
/* Oncology alert */
.onco-alert{background:rgba(225,29,72,.08);border:1px solid rgba(225,29,72,.35);border-radius:13px;padding:14px 17px;margin-bottom:13px}
.onco-title{color:#fb7185;font-size:12px;font-weight:700;letter-spacing:1px;margin-bottom:8px}
.onco-item{color:#fda4af;font-size:13px;padding:3px 0;line-height:1.5}
.onco-item+.onco-item{border-top:1px solid rgba(225,29,72,.15)}
/* Comorbidity summary */
.comorbid-block{background:rgba(124,58,237,.07);border:1px solid rgba(124,58,237,.25);border-radius:13px;padding:14px 17px;margin-bottom:13px}
.cb-title{color:#c4b5fd;font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:8px}
.cb-tags{display:flex;flex-wrap:wrap;gap:6px}
.cb-tag{background:rgba(124,58,237,.18);border:1px solid rgba(124,58,237,.3);color:#c4b5fd;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600}
/* Warnings block */
.warns-block{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.28);border-radius:13px;padding:14px 17px;margin-bottom:13px}
.wb-title{color:var(--amber);font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:8px}
.wb-item{color:#fcd34d;font-size:13px;padding:4px 0}.wb-item+.wb-item{border-top:1px solid rgba(245,158,11,.15)}
/* Summary grid */
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:13px}
.sum-cell{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:10px 13px}
.sum-key{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px}
.sum-val{font-size:14px;font-weight:700;color:var(--t1);font-family:var(--mono)}
/* Share */
.share-block{background:rgba(14,165,201,.06);border:1px solid rgba(14,165,201,.2);border-radius:13px;padding:15px 17px;margin-bottom:13px}
.sb-title{color:var(--teal);font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:8px}
.sb-desc{color:var(--t3);font-size:12px;margin-bottom:10px;line-height:1.5}
.url-row{display:flex;gap:8px}
.url-box{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:8px 11px;color:var(--t2);font-family:var(--mono);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-copy{padding:8px 13px;border-radius:8px;border:1px solid var(--teal);background:rgba(14,165,201,.12);color:var(--teal);font-size:12px;cursor:pointer;font-family:var(--sans);font-weight:600;transition:all .15s;white-space:nowrap}
.btn-copy:hover{background:rgba(14,165,201,.22)}.btn-copy.copied{background:rgba(22,163,74,.18);border-color:var(--green);color:#86efac}
/* Shared banner */
.shared-banner{background:rgba(14,165,201,.08);border:1px solid rgba(14,165,201,.25);border-radius:13px;padding:13px 17px;margin-bottom:13px;display:flex;align-items:center;gap:10px}
.sb-ico{font-size:20px}.sb-txt{font-size:13px;color:var(--t2);line-height:1.4}.sb-txt strong{color:var(--teal)}
/* Buttons */
.btn-row{display:flex;gap:10px;margin-bottom:10px}
.btn-sec{flex:1;padding:11px;border-radius:12px;border:1px solid var(--border2);background:transparent;color:var(--t2);font-size:13px;cursor:pointer;font-family:var(--sans);font-weight:600;transition:all .15s}
.btn-sec:hover{border-color:var(--border3);color:var(--t1)}
/* History */
.hist-empty{color:var(--t3);text-align:center;padding:40px 0;font-size:14px}
.hist-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;border:1px solid var(--border2);background:var(--bg3);margin-bottom:9px;cursor:pointer;transition:border-color .15s}
.hist-item:hover{border-color:var(--border3)}
.hi-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.hi-info{flex:1;min-width:0}
.hi-name{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hi-meta{font-size:11px;color:var(--t3)}.hi-dec{font-size:12px;font-weight:600}.hi-arr{color:var(--t5);font-size:17px}
.tabs{display:flex;gap:5px;margin-bottom:16px}
.tab{flex:1;padding:8px;border-radius:10px;border:1px solid var(--border2);background:transparent;color:var(--t3);font-size:12px;cursor:pointer;font-family:var(--sans);font-weight:600;transition:all .15s}
.tab.active{background:rgba(14,165,201,.14);border-color:var(--teal);color:var(--teal)}
.footer-note{text-align:center;color:var(--t5);font-size:11px;margin-top:14px}
.spinner{width:30px;height:30px;border:3px solid var(--border2);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin:50px auto}
/* Section header inside checklist */
.ch-section{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--t3);text-transform:uppercase;margin:10px 0 5px;padding-left:2px}
@media(max-width:480px){
  .choices-grid{grid-template-columns:1fr}.sliders-row{flex-direction:column;gap:14px}
  .sum-grid{grid-template-columns:1fr}.meta-row{flex-direction:column}
  .card-body{padding:20px}.bmi-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="shell" id="app"><div class="spinner"></div></div>
<script>
// ═══════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════
const STORAGE_KEY = 'neuroscore_history_v2';

const CONTRA = [
  {id:'hem_hist',  label:'Внутричерепная геморрагия в анамнезе'},
  {id:'surgery',   label:'Тяжёлая травма / операция < 3 месяцев'},
  {id:'bleeding',  label:'Активное внутреннее кровотечение'},
  {id:'platelets', label:'Тромбоцитопения < 100 000'},
  {id:'inr',       label:'МНО > 1.7 или гепарин (АЧТВ > 40 с)'},
  {id:'noac',      label:'НОАК в активной дозе (< 48 ч)'},
  {id:'hypogly',   label:'Гипогликемия как причина симптомов'},
  {id:'endo',      label:'Инфекционный эндокардит'},
  {id:'aorta',     label:'Расслоение аорты'},
];

const COMORBIDITIES = [
  {id:'afib',       label:'Фибрилляция / трепетание предсердий',  amber:true},
  {id:'htn',        label:'Артериальная гипертензия'},
  {id:'dm',         label:'Сахарный диабет'},
  {id:'prior_stroke',label:'Предшествующий инсульт / ТИА'},
  {id:'chf',        label:'Хроническая сердечная недостаточность'},
  {id:'cad',        label:'ИБС / инфаркт миокарда в анамнезе'},
  {id:'ckd',        label:'Хроническая болезнь почек (СКФ < 60)'},
  {id:'liver',      label:'Тяжёлая патология печени'},
  {id:'copd',       label:'ХОБЛ / дыхательная недостаточность'},
  {id:'dementia',   label:'Деменция / когнитивное снижение'},
  {id:'coagulopathy',label:'Коагулопатия (не связанная с медикаментами)'},
];

const ONCOLOGY_ITEMS = [
  {id:'active_cancer',   label:'Активное онкологическое заболевание', amber:false},
  {id:'brain_mets_risk', label:'Подозрение на метастазы в ГМ (известная онкология)', amber:false},
  {id:'recent_chemo',    label:'Химиотерапия / иммунотерапия за последние 3 месяца'},
  {id:'recent_radio',    label:'Лучевая терапия на область головы / шеи'},
  {id:'coagulo_onco',    label:'Паранеопластическая коагулопатия / тромбоцитопения'},
  {id:'brain_primary',   label:'Первичная опухоль мозга (глиобластома, менингиома и др.)'},
];

const ONSET_OPTS = [
  {v:'1',          l:'< 1 часа',               i:'⚡'},
  {v:'2',          l:'1–3 часа',               i:'🕐'},
  {v:'3',          l:'3–4.5 часа',             i:'🕒'},
  {v:'wake_early', l:'Пробуждение ≤ 4.5 ч',   i:'🌅'},
  {v:'6',          l:'4.5–6 часов',             i:'🕕'},
  {v:'12',         l:'6–12 часов',              i:'🕕'},
  {v:'24',         l:'12–24 часа',              i:'🕛'},
  {v:'unknown',    l:'Неизвестно / пробуждение',i:'❓'},
];

const NIHSS_QUICK = [0,2,5,8,10,14,16,20,25,30,42];

const BMI_CATS = [
  {max:18.5, label:'Дефицит массы',   c:'#60a5fa', bg:'rgba(96,165,250,.08)',  bc:'rgba(96,165,250,.25)'},
  {max:25,   label:'Нормальная масса',c:'#4ADE80', bg:'rgba(74,222,128,.08)',  bc:'rgba(74,222,128,.25)'},
  {max:30,   label:'Избыточная масса',c:'#F59E0B', bg:'rgba(245,158,11,.08)', bc:'rgba(245,158,11,.25)'},
  {max:35,   label:'Ожирение I',      c:'#fb923c', bg:'rgba(251,146,60,.08)', bc:'rgba(251,146,60,.25)'},
  {max:40,   label:'Ожирение II',     c:'#f87171', bg:'rgba(248,113,113,.08)',bc:'rgba(248,113,113,.25)'},

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let S = {
  view: 'quiz',
  stepIdx: 0,
  answers: {
    patient_name:'', patient_age:'',
    height_cm:'', weight_kg:'',
    nihss:0, bp_sys:140, bp_dia:85, glucose:5.8, aspects:10,

// ═══════════════════════════════════════════════════════
// STEPS
// ═══════════════════════════════════════════════════════
function buildSteps(ans) {
  const late = ans.onset_time === 'unknown' || ans.onset_time === '12' || ans.onset_time === '24' ||
               (ans.onset_time && parseFloat(ans.onset_time) > 4.5);
  const lvo  = ans.lvo === 'yes';
  const nihss = parseInt(ans.nihss) || 0;

  const steps = [
    {id:'meta',       title:'Данные пациента',                hint:'Необязательно. Используется при сохранении записи и при отправке ссылки коллеге.',  type:'meta'},
    {id:'onset_time', title:'Когда появились симптомы?',      hint:'Точное время начала симптомов определяет возможность тромболизиса и выбор протокола.', type:'onset'},
    {id:'bmi',        title:'Антропометрия',                  hint:'Используется для оценки дозы препаратов, рисков процедуры и метаболического фона.',    type:'bmi'},
    {id:'comorbidities',title:'Сопутствующие заболевания',    hint:'Отметьте все имеющиеся. Влияют на выбор тактики, риски и долгосрочный прогноз.',      type:'comorbid'},
    {id:'oncology',   title:'Онкологический анамнез',         hint:'Активная онкология и метастазы в ГМ существенно меняют тактику. Отметьте при наличии.', type:'onco'},
    {id:'hemorrhage', title:'КТ головного мозга: есть геморрагия?', hint:'КТ без контраста — цель: выполнить < 20 мин от поступления.', type:'binary',
      opts:[
        {v:'no',      l:'Нет геморрагии',      i:'✅', c:'var(--green)'},
        {v:'yes',     l:'Геморрагия выявлена', i:'🚨', c:'var(--red)'},
        {v:'pending', l:'КТ выполняется...',   i:'⏳', c:'var(--amber)'},
      ]
    },
    {id:'nihss',     title:'Оценка по шкале NIHSS',           hint:'Неврологический дефицит на момент осмотра. 0 = нет дефицита, 42 = максимальный.', type:'nihss'},
    {id:'bp',        title:'Артериальное давление',           hint:'Для тромболизиса необходимо АД ≤ 185/110 мм рт. ст. При необходимости снизить лабеталолом IV.', type:'bp'},
    {id:'glucose',   title:'Глюкоза крови (ммоль/л)',         hint:'Гипогликемия может имитировать инсульт. При < 3.3 — немедленная коррекция.', type:'glucose'},
    {id:'contra',    title:'Противопоказания к тромболизису', hint:'Отметьте все имеющиеся. Если нет ни одного — оставьте пустым.',                 type:'checklist'},
    {id:'lvo',       title:'КТА: окклюзия крупного сосуда?',  hint:'ВСА, СМА М1/М2, базилярная артерия. ОКС — основное показание к тромбэктомии.',  type:'binary',
      opts:[
        {v:'yes',     l:'ОКС подтверждена',     i:'🔴', c:'var(--red)'},
        {v:'no',      l:'Окклюзия не выявлена', i:'✅', c:'var(--green)'},
        {v:'pending', l:'КТА выполняется...',   i:'⏳', c:'var(--amber)'},
      ]
    },
    {id:'aspects',   title:'Оценка ASPECTS (КТ / МРТ)',       hint:'0–10 баллов. ≥ 6 = стандартное показание к МТ. 3–5 = индивидуально. < 3 = обширный инфаркт.', type:'aspects'},
  ];

  if (late && lvo && nihss >= 6) {
    steps.push({id:'perfusion', title:'КТ/МРТ-перфузия: критерии DAWN / DEFUSE-3?',
      hint:'Core < 70 мл · Penumbra/Core ≥ 1.8 · Мисматч ≥ 15 мл. Обязательна при расширенном окне.', type:'binary',
      opts:[
        {v:'yes',     l:'Критерии выполнены',    i:'✅', c:'var(--green)'},
        {v:'no',      l:'Критерии не выполнены', i:'❌', c:'var(--red)'},
        {v:'unavail', l:'Перфузия недоступна',   i:'⚠️', c:'var(--amber)'},
      ]
    });
  }
  return steps;
}

// ═══════════════════════════════════════════════════════
// BMI HELPERS
// ═══════════════════════════════════════════════════════
function calcBMI(h, w) {
  const hm = parseFloat(h) / 100;
  const wk = parseFloat(w);
  if (!hm || !wk || hm <= 0) return null;
  return Math.round((wk / (hm * hm)) * 10) / 10;
}
function bmiCat(bmi) {
  if (!bmi) return null;
  return BMI_CATS.find(c => bmi < c.max) || BMI_CATS[BMI_CATS.length-1];
}

// ═══════════════════════════════════════════════════════
// DECISION ENGINE
// ═══════════════════════════════════════════════════════
function computeDecision(ans) {
  const nihss      = parseInt(ans.nihss) || 0;
  const bpDanger   = parseInt(ans.bp_sys) > 185 || parseInt(ans.bp_dia) > 110;
  const gluLow     = parseFloat(ans.glucose) < 3.3;
  const gluHigh    = parseFloat(ans.glucose) > 10.0;
  const hasContra  = ans.contra && ans.contra.length > 0;
  const aspects    = parseInt(ans.aspects) ?? 10;
  const late       = ans.onset_time === 'unknown' || ans.onset_time === '12' || ans.onset_time === '24' ||
                     (ans.onset_time && parseFloat(ans.onset_time) > 4.5);
  const early      = !late && ans.onset_time && ans.onset_time !== 'pending';
  const earlyOrWake= early || ans.onset_time === 'wake_early';
  const co         = ans.comorbidities || [];
  const onco       = ans.oncology || [];
  const bmi        = calcBMI(ans.height_cm, ans.weight_kg);

  // Oncology flags
  const hasBrainMets   = onco.includes('brain_mets_risk') || onco.includes('brain_primary');
  const hasActiveCancer= onco.includes('active_cancer');
  const hasOnco        = onco.length > 0;
  const oncoContra     = onco.includes('brain_mets_risk') || onco.includes('brain_primary') || onco.includes('coagulo_onco');

  // Effective contraindications (oncology adds some)
  const effectiveContra = hasContra || oncoContra;

  const warnings = [];
  if (bpDanger) warnings.push(`⚠️ АД ${ans.bp_sys}/${ans.bp_dia} — снизить до < 185/110 перед тромболизисом`);
  if (gluLow)   warnings.push(`⚠️ Гипогликемия (${ans.glucose} ммоль/л) — немедленная коррекция`);
  if (gluHigh)  warnings.push(`⚠️ Гипергликемия (${ans.glucose} ммоль/л) — инсулин при > 10 ммоль/л`);
  if (co.includes('afib')) warnings.push(`⚠️ Фибрилляция предсердий — определить срок начала антикоагуляции (обычно 4–14 сут)`);
  if (co.includes('ckd'))  warnings.push(`⚠️ ХБП — скорректировать дозы, оценить риск контраста при КТА`);
  if (bmi && bmi >= 40)    warnings.push(`⚠️ Морбидное ожирение (ИМТ ${bmi}) — лимит дозы тенектеплазы 25 мг актуален`);
  if (hasBrainMets)        warnings.push(`🔴 Подозрение на метастазы ГМ — необходима МРТ с контрастом для дифференцировки с инсультом`);
  if (hasActiveCancer && !hasBrainMets) warnings.push(`⚠️ Активная онкология — повышен риск геморрагической трансформации`);
  if (onco.includes('recent_chemo')) warnings.push(`⚠️ Недавняя химиотерапия — возможна тромбоцитопения, проверить ОАК`);

  // Oncology notes (separate section in result)
  const oncoAlerts = [];
  if (hasBrainMets) {
    oncoAlerts.push('МРТ с контрастом (gadolinium) — приоритет для исключения метастаза, первичной опухоли');
    oncoAlerts.push('Если метастаз с геморрагическим компонентом — тромболизис противопоказан');
    oncoAlerts.push('Нейрохирургический консилиум при подтверждении опухолевой природы');
    oncoAlerts.push('При подтверждении инсульта у онкопациента — тромбэктомия предпочтительнее ТЛ');
  }
  if (hasActiveCancer && !hasBrainMets) {
    oncoAlerts.push('Онкоассоциированная гиперкоагуляция — возможная причина инсульта');
    oncoAlerts.push('Исключить небактериальный тромбоэндокардит (Либмана–Сакса)');
    oncoAlerts.push('Тромболизис — риск геморрагической трансформации повышен');
  }
  if (onco.includes('brain_primary')) {
    oncoAlerts.push('Первичная опухоль ГМ — риск кровоизлияния при тромболизисе очень высок');
    oncoAlerts.push('Обсудить тромбэктомию как предпочтительный метод при ОКС');
  }

  if (ans.hemorrhage === 'yes') return {
    type:'redirect', color:'#DC2626',
    title:'Геморрагический инсульт',
    subtitle:'Требуется другой протокол',
    actions:[
      'Немедленный нейрохирургический консилиум',
      'Протокол геморрагического инсульта',
      'Отменить антикоагулянты / антиагреганты',
      'Контроль АД: цель < 140 мм рт. ст.',
      hasBrainMets ? '⚠️ Исключить кровоизлияние в метастаз — МРТ с контрастом' : null,
    ].filter(Boolean), warnings, oncoAlerts, urgent:true,
  };

  const canLyse = !effectiveContra && nihss >= 1 && earlyOrWake;
  const canMT   = ans.lvo === 'yes' && aspects >= 3 && nihss >= 6;
  const lateMT  = ans.lvo === 'yes' && late && ans.perfusion === 'yes' && aspects >= 3 && nihss >= 6;
  const largeCore = ans.lvo === 'yes' && aspects >= 3 && aspects <= 5 && nihss >= 6;

  // Dose note
  const doseNote = bmi && bmi >= 30
    ? `Доза ТНК 0.25 мг/кг — лимит 25 мг (ИМТ ${bmi})`
    : 'Тенектеплаза 0.25 мг/кг IV болюс (макс. 25 мг)';

  if (canLyse && canMT) return {
    type:'combined', color:'#0EA5C9',
    title:'Тромболизис + Тромбэктомия',
    subtitle:'Bridging-стратегия',
    actions:[
      doseNote + ' — СЕЙЧАС',
      'Параллельно: подготовка к тромбэктомии',
      'Цель door-to-needle < 45 мин · door-to-groin < 90 мин',
      bpDanger ? '⚠️ Снизить АД до < 185/110 перед введением' : 'АД в норме — тромболизис без задержки',
    ], warnings, oncoAlerts, urgent:true,
  };

  if (lateMT) return {
    type:'thrombectomy_late', color:'#F59E0B',
    title:'Механическая тромбэктомия',
    subtitle:'Расширенное окно 6–24 ч (DAWN / DEFUSE-3)',
    actions:[
      'Тромбэктомия показана — критерии перфузии выполнены',
      'Цель door-to-groin < 90 мин',
      aspects <= 5 ? `ASPECTS ${aspects} — индивидуальное решение, консилиум` : `ASPECTS ${aspects} — показание подтверждено`,
      'Оценить: возраст, premorbid mRS, сопутствующие заболевания',
    ], warnings, oncoAlerts, urgent:true,
  };

  if (canLyse && !canMT) return {
    type:'thrombolysis', color:'#0B6E8F',
    title:'Внутривенный тромболизис',
    subtitle: ans.lvo === 'no' ? 'Нет окклюзии крупного сосуда' : 'КТА ожидается / без ОКС',
    actions:[
      doseNote + ' — ПРЕДПОЧТИТЕЛЬНО',
      'Альтернатива: Альтеплаза 0.9 мг/кг (макс. 90 мг, 10% болюс + 60 мин)',
      'Цель door-to-needle < 45 мин',
      'Повторная КТА при ухудшении — исключить ОКС',
    ], warnings, oncoAlerts, urgent:true,
  };

  if (canMT && !canLyse) return {
    type:'thrombectomy', color:'#16A34A',
    title:'Механическая тромбэктомия',
    subtitle: effectiveContra ? (oncoContra ? 'Онкологические противопоказания к ТЛ' : 'Противопоказания к тромболизису') : 'Позднее окно — ТЛ не показан',
    actions:[
      'МТ показана — ОКС подтверждена',
      'Цель door-to-groin < 90 мин',
      aspects <= 5 ? `⚠️ ASPECTS ${aspects} — обсудить с командой` : `ASPECTS ${aspects} — показание подтверждено`,
      `NIHSS ${nihss} — тяжесть дефицита`,
    ], warnings, oncoAlerts, urgent:true,
  };

  if (largeCore) return {
    type:'large_core', color:'#7C3AED',
    title:'Большой инфаркт — Индивидуальный подход',
    subtitle:`ASPECTS ${aspects} · NIHSS ${nihss}`,
    actions:[
      'МТ может быть полезна (ANGEL-ASPECT, SELECT2, TENSION)',
      'Мультидисциплинарный консилиум',
      'Оценить: возраст, premorbid mRS, сопутствующие заболевания',
      'Нейрохирургия: декомпрессивная краниотомия?',
    ], warnings, oncoAlerts, urgent:false,
  };

  return {
    type:'medical', color:'#475569',
    title:'Медикаментозное лечение',
    subtitle:`NIHSS ${nihss}${late && ans.lvo !== 'yes' ? ' · Нет ОКС · Позднее окно' : ''}`,
    actions:[
      'Аспирин 300 мг — в первые 24–48 ч',
      nihss <= 3 ? 'ДААП: Аспирин + Клопидогрел 75 мг (малый инсульт / ТИА)' : 'Монотерапия Аспирином',
      'Статины: Аторвастатин 40–80 мг',
      'Госпитализация в инсультный блок · Холтер ЭКГ ≥ 24 ч',
    ], warnings, oncoAlerts, urgent:false,
  };
}

// ═══════════════════════════════════════════════════════
// SEVERITY HELPERS
// ═══════════════════════════════════════════════════════
function nihssSev(n) {
  if (n===0)  return {l:'Нет дефицита',      c:'#4ADE80',bg:'rgba(74,222,128,.08)', bc:'rgba(74,222,128,.25)'};
  if (n<=4)   return {l:'Малый инсульт',      c:'#a3e635',bg:'rgba(163,230,53,.08)',bc:'rgba(163,230,53,.25)'};
  if (n<=15)  return {l:'Умеренный инсульт',  c:'#F59E0B',bg:'rgba(245,158,11,.08)',bc:'rgba(245,158,11,.25)'};
  if (n<=20)  return {l:'Умеренно тяжёлый',   c:'#fb923c',bg:'rgba(251,146,60,.08)',bc:'rgba(251,146,60,.25)'};
  return            {l:'Тяжёлый инсульт',     c:'#DC2626',bg:'rgba(220,38,38,.08)', bc:'rgba(220,38,38,.25)'};
}
function aspectsSev(n) {
  if (n>=8) return {l:'Малый инфаркт',                  c:'#4ADE80',bg:'rgba(74,222,128,.08)', bc:'rgba(74,222,128,.25)'};
  if (n>=6) return {l:'Умеренный инфаркт',              c:'#F59E0B',bg:'rgba(245,158,11,.08)',bc:'rgba(245,158,11,.25)'};
  if (n>=3) return {l:'Большой инфаркт — индивидуально',c:'#fb923c',bg:'rgba(251,146,60,.08)',bc:'rgba(251,146,60,.25)'};
  return          {l:'Обширный инфаркт',                 c:'#DC2626',bg:'rgba(220,38,38,.08)', bc:'rgba(220,38,38,.25)'};
}
function bpStatus(sys, dia) {
  if (sys>185||dia>110) return {l:'Снизить до тромболизиса',c:'#DC2626',bg:'rgba(220,38,38,.1)',bc:'rgba(220,38,38,.35)'};
  if (sys>160||dia>100) return {l:'Умеренная гипертензия',  c:'#F59E0B',bg:'rgba(245,158,11,.1)',bc:'rgba(245,158,11,.35)'};
  return {l:'Норма',c:'#16A34A',bg:'rgba(22,163,74,.1)',bc:'rgba(22,163,74,.25)'};
}

// ═══════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════
function loadHistory() { try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||[];}catch(e){return[];} }
function saveHistory(l){ try{localStorage.setItem(STORAGE_KEY,JSON.stringify(l));}catch(e){} }
function addToHistory(ans,dec) {
  const list = loadHistory();
  const bmi  = calcBMI(ans.height_cm, ans.weight_kg);
  const entry = {
    id:Date.now(), ts:new Date().toISOString(),
    name: ans.patient_name || 'Пациент #'+(list.length+1),
    age:  ans.patient_age  || '—',
    nihss:ans.nihss, aspects:ans.aspects,
    bmi: bmi ? String(bmi) : '—',
    decision:dec.title, dec_type:dec.type, dec_color:dec.color,
    answers:ans,
  };
  list.unshift(entry); if(list.length>50)list.length=50;
  saveHistory(list); return entry;
}
function clearHistory() {
  if(confirm('Удалить всю историю? Действие необратимо.')) { saveHistory([]); S.history=[]; render(); }
}

// ═══════════════════════════════════════════════════════
// URL SHARING
// ═══════════════════════════════════════════════════════
function encodeData(ans, dec) {
  try {
    const b64 = btoa(unescape(encodeURIComponent(JSON.stringify({v:2,ans,dec}))));
    return window.location.href.split('#')[0]+'#data='+b64;
  } catch(e){return window.location.href;}
}
function decodeFromHash() {
  const hash = window.location.hash;
  if(!hash.startsWith('#data='))return null;
  try {
    const parsed = JSON.parse(decodeURIComponent(escape(atob(hash.slice(6)))));
    if(parsed.v===2||parsed.v===1) return parsed;
    return null;
  } catch(e){return null;}
}

// ═══════════════════════════════════════════════════════
// STEP VALIDATION
// ═══════════════════════════════════════════════════════
function canProceed(step, ans) {
  switch(step.id) {
    case 'meta':         return true;
    case 'onset_time':   return !!ans.onset_time;
    case 'bmi':          return true; // optional
    case 'comorbidities':return true;
    case 'oncology':     return true;
    case 'hemorrhage':   return !!ans.hemorrhage && ans.hemorrhage!=='pending';
    case 'nihss':        return ans.nihss!==undefined && ans.nihss!=='';
    case 'bp':           return !!ans.bp_sys && !!ans.bp_dia;
    case 'glucose':      return !!ans.glucose && !isNaN(parseFloat(ans.glucose));
    case 'contra':       return true;
    case 'lvo':          return !!ans.lvo && ans.lvo!=='pending';
    case 'aspects':      return ans.aspects!==undefined && ans.aspects!=='';
    case 'perfusion':    return !!ans.perfusion;
    default: return true;
  }
}

// ═══════════════════════════════════════════════════════
// TRANSITIONS
// ═══════════════════════════════════════════════════════
function transition(fn, dir='au') {
  const body = document.getElementById('card-body');
  if(body){body.style.opacity='0';body.style.transform=dir==='au'?'translateY(8px)':'translateY(-6px)';}
  setTimeout(()=>{fn();render();},180);
}
function goNext() {
  const steps = buildSteps(S.answers);
  const step  = steps[S.stepIdx];
  if(!canProceed(step,S.answers)) return;
  if(S.answers.hemorrhage==='yes') {
    S.decision=computeDecision(S.answers); addToHistory(S.answers,S.decision);
    transition(()=>{S.view='result';});return;
  }
  if(S.stepIdx>=steps.length-1) {
    S.decision=computeDecision(S.answers); addToHistory(S.answers,S.decision);
    transition(()=>{S.view='result';});
  } else {
    transition(()=>{S.stepIdx++;});
  }
}
function goBack()    { if(S.stepIdx===0)return; transition(()=>{S.stepIdx--;},'ad'); }
function resetQuiz() {
  S.answers={patient_name:'',patient_age:'',height_cm:'',weight_kg:'',nihss:0,bp_sys:140,bp_dia:85,glucose:5.8,aspects:10,contra:[],comorbidities:[],oncology:[]};
  S.decision=null; S.stepIdx=0;
  history.replaceState(null,'',window.location.pathname+window.location.search);
  transition(()=>{S.view='quiz';},'ad');
}
function showHistory(){ transition(()=>{S.view='history';S.history=loadHistory();});}
function showQuiz()   { transition(()=>{S.view='quiz';},'ad'); }

// COPY
// ═══════════════════════════════════════════════════════
function copyUrl(url,btnId) {
  navigator.clipboard.writeText(url).then(()=>{
    const b=document.getElementById(btnId);
    if(b){b.classList.add('copied');b.textContent='✓ Скопировано';}
    setTimeout(()=>{const b2=document.getElementById(btnId);if(b2){b2.classList.remove('copied');b2.textContent='Копировать';}},2500);
  }).catch(()=>{
    const ta=document.createElement('textarea');ta.value=url;ta.style.position='fixed';ta.style.top='-9999px';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);

function h(tag,attrs,...ch){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){if(k==='class')el.className=v;else if(k.startsWith('on'))el[k]=v;else el.setAttribute(k,v);}
  for(const c of ch){if(c==null||c===false)continue;if(typeof c==='string'||typeof c==='number')el.insertAdjacentHTML('beforeend',String(c));else el.appendChild(c);}
  return el;
}
function div(cls,...ch){return h('div',{class:cls},...ch);}
function btn(cls,text,onclick){const b=h('button',{class:cls,onclick});b.innerHTML=text;return b;}

function renderDecision(dec, ans, isShared){
  const root=div('');
  if(isShared){
    const banner=div('shared-banner');
    banner.innerHTML='<span class="sb-ico">🔗</span><div class="sb-txt">Вы просматриваете <strong>общий случай</strong>. Данные переданы через ссылку. Результат рассчитан по AHA/ASA 2026.</div>';
    root.appendChild(banner);
  }

  // Main decision block
  const hdr=div('dec-header');
  hdr.style.background=dec.color+'14';hdr.style.borderColor=dec.color+'70';
  const top=div('dec-top');
  const dot=div('dec-dot');dot.style.background=dec.color;dot.style.boxShadow=`0 0 10px ${dec.color}`;
  const titles=div('');
  const title=div('dec-title');title.style.color=dec.color;title.textContent=dec.title;
  const sub=div('dec-sub');sub.textContent=dec.subtitle;
  titles.append(title,sub); top.append(dot,titles);
  if(dec.urgent){const ub=div('urg-badge');ub.textContent='СРОЧНО';ub.style.background=dec.color+'25';ub.style.border=`1px solid ${dec.color}60`;ub.style.color=dec.color;top.appendChild(ub);}
  hdr.appendChild(top);
  const al=div('actions');
  dec.actions.forEach((a,i)=>{
    const item=div('act-item');
    const num=div('act-num');num.textContent=String(i+1).padStart(2,'0');num.style.background=dec.color+'25';num.style.color=dec.color;
    const txt=div('act-txt');txt.textContent=a;
    item.append(num,txt);al.appendChild(item);
  });
  hdr.appendChild(al); root.appendChild(hdr);

  // Oncology alerts
  if(dec.oncoAlerts && dec.oncoAlerts.length>0){
    const ob=div('onco-alert');
    const ot=div('onco-title');ot.textContent='🧬 ОНКОЛОГИЧЕСКИЙ АСПЕКТ';ob.appendChild(ot);
    dec.oncoAlerts.forEach(a=>{const i=div('onco-item');i.textContent=a;ob.appendChild(i);});
    root.appendChild(ob);
  }

  // Warnings
  if(dec.warnings && dec.warnings.length>0){
    const wb=div('warns-block');
    const wt=div('wb-title');wt.textContent='⚠️ ТРЕБУЕТ ВНИМАНИЯ';wb.appendChild(wt);
    dec.warnings.forEach(w=>{const wi=div('wb-item');wi.textContent=w;wb.appendChild(wi);});
    root.appendChild(wb);
  }

  // Comorbidities block
  const co=ans&&ans.comorbidities||[];
  const onco=ans&&ans.oncology||[];
  if((co.length>0||onco.length>0)&&!isShared){
    const cb=div('comorbid-block');
    const ct=div('cb-title');ct.textContent='📋 СОПУТСТВУЮЩИЙ ФОН';cb.appendChild(ct);
    const tags=div('cb-tags');
    const coNames={afib:'ФП',htn:'АГ',dm:'СД',prior_stroke:'Предшеств. инсульт',chf:'СН',cad:'ИБС',ckd:'ХБП',liver:'Патология печени',copd:'ХОБЛ',dementia:'Деменция',coagulopathy:'Коагулопатия'};
    const oncoNames={active_cancer:'Онкология',brain_mets_risk:'Метастазы ГМ?',recent_chemo:'Химиотерапия',recent_radio:'Лучевая терапия',coagulo_onco:'Онко-коагулопатия',brain_primary:'Первичная опухоль ГМ'};
    co.forEach(id=>{if(coNames[id]){const t=div('cb-tag');t.textContent=coNames[id];tags.appendChild(t);}});
    onco.forEach(id=>{if(oncoNames[id]){const t=div('cb-tag');t.style.background='rgba(225,29,72,.18)';t.style.border='1px solid rgba(225,29,72,.3)';t.style.color='#fda4af';t.textContent=oncoNames[id];tags.appendChild(t);}});
    if(tags.children.length>0){cb.appendChild(tags);root.appendChild(cb);}
  }

  // Summary grid
  if(!isShared){
    const bmi=calcBMI(ans.height_cm,ans.weight_kg);
    const sg=div('sum-grid');
    const cells=[
      {k:'NIHSS',   v:String(ans.nihss||0)},
      {k:'ASPECTS', v:String(ans.aspects??10)},
      {k:'АД',      v:`${ans.bp_sys}/${ans.bp_dia}`},
      {k:'Глюкоза', v:`${ans.glucose} ммоль/л`},
      {k:'ИМТ',     v:bmi?String(bmi):'—'},
      {k:'Препятств. ТЛ',v:(ans.contra&&ans.contra.length>0)?`${ans.contra.length} фактор(а)` : 'Нет'},
    ];
    cells.forEach(c=>{
      const cell=div('sum-cell');
      const k=div('sum-key');k.textContent=c.k;
      const v=div('sum-val');v.textContent=c.v;
      cell.append(k,v);sg.appendChild(cell);
    });
    root.appendChild(sg);
  }

  // Shared summary
  if(isShared&&ans){
    const bmi=calcBMI(ans.height_cm,ans.weight_kg);
    const sg=div('sum-grid');
    [{k:'Пациент',v:ans.patient_name||'—'},{k:'Возраст',v:ans.patient_age?ans.patient_age+' лет':'—'},
     {k:'NIHSS',v:String(ans.nihss||0)},{k:'ASPECTS',v:String(ans.aspects??10)},
     {k:'АД',v:`${ans.bp_sys}/${ans.bp_dia}`},{k:'ИМТ',v:bmi?String(bmi):'—'}].forEach(c=>{
      const cell=div('sum-cell');const k=div('sum-key');k.textContent=c.k;
      const v=div('sum-val');v.style.fontFamily='var(--sans)';v.style.fontSize='13px';v.textContent=c.v;
      cell.append(k,v);sg.appendChild(cell);
    });
    root.appendChild(sg);
  }

  // Share block
  if(!isShared){
    const shareUrl=encodeData(ans,dec);
    const sb=div('share-block');
    const st=div('sb-title');st.textContent='🔗 ПОДЕЛИТЬСЯ СЛУЧАЕМ';
    const sd=div('sb-desc');sd.textContent='Скопируйте ссылку и отправьте коллеге. При переходе откроется этот результат с данными пациента.';
    const urlRow=div('url-row');
    const urlBox=div('url-box');urlBox.textContent=shareUrl;
    const cpyBtn=btn('btn-copy','Копировать',()=>copyUrl(shareUrl,'cpybtn'));cpyBtn.id='cpybtn';
    urlRow.append(urlBox,cpyBtn);sb.append(st,sd,urlRow);root.appendChild(sb);
  }

  // Buttons
  if(!isShared){
    const brow=div('btn-row');
    brow.append(btn('btn-sec','↺ Новый пациент',()=>resetQuiz()),btn('btn-sec','📋 История',()=>showHistory()));
    root.appendChild(brow);
  } else {
    const brow=div('btn-row');
    const nb=btn('btn-next','← Начать новый осмотр',()=>{
      history.replaceState(null,'',window.location.pathname+window.location.search);
      S.sharedData=null;S.view='quiz';render();
    });nb.style.flex='1';brow.appendChild(nb);root.appendChild(brow);
  }

  const fn=div('footer-note');fn.textContent='AHA/ASA 2026 · Neuro-Score · Prabhakaran et al.';
  root.appendChild(fn);
  return root;
}

// ═══════════════════════════════════════════════════════
// RENDER HISTORY
// ═══════════════════════════════════════════════════════
function renderHistoryView(){
  const root=div('');
  const hdr=div('');hdr.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;';
  const t=div('');t.innerHTML='<div style="color:var(--teal);font-size:12px;font-weight:700;letter-spacing:1.5px;">📋 ИСТОРИЯ ПАЦИЕНТОВ</div><div style="color:var(--t3);font-size:12px;margin-top:2px;">Хранится локально в браузере</div>';
  hdr.appendChild(t);
  if(S.history.length>0){const cl=btn('btn-sec','🗑 Очистить',()=>clearHistory());cl.style.cssText='padding:7px 13px;font-size:12px;';hdr.appendChild(cl);}
  root.appendChild(hdr);

  if(S.history.length===0){
    const em=div('hist-empty');em.innerHTML='Ещё нет сохранённых пациентов.<br>Результаты появятся после завершения опроса.';root.appendChild(em);
  } else {
    S.history.forEach(entry=>{
      const item=div('hist-item');
      item.onclick=()=>{S.answers=entry.answers;S.decision=computeDecision(entry.answers);S.view='result';render();};
      const dot=div('hi-dot');dot.style.background=entry.dec_color||'var(--t3)';dot.style.boxShadow=`0 0 6px ${entry.dec_color||'var(--t3)'}`;
      const info=div('hi-info');
      const name=div('hi-name');name.textContent=entry.name;
      const ts=new Date(entry.ts).toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
      const meta=div('hi-meta');meta.textContent=`${ts} · Возраст: ${entry.age} · NIHSS: ${entry.nihss} · ASPECTS: ${entry.aspects}${entry.bmi&&entry.bmi!=='—'?' · ИМТ: '+entry.bmi:''}`;
      const decLbl=div('hi-dec');decLbl.style.color=entry.dec_color||'var(--t2)';decLbl.textContent='→ '+entry.decision;
      info.append(name,meta,decLbl);
      const arr=div('hi-arr');arr.textContent='›';
      item.append(dot,info,arr);root.appendChild(item);
    });
  }

  const backBtn=btn('btn-next','← Новый пациент',()=>showQuiz());backBtn.style.cssText='width:100%;margin-top:8px;';
  root.appendChild(backBtn);
  const fn=div('footer-note');fn.textContent='Данные хранятся только в этом браузере · Neuro-Score AIS 2026';
  root.appendChild(fn);
  return root;
}

// ═══════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════
function render(){
  const app=document.getElementById('app');
  app.innerHTML='';

  function makeTopbar(sub, rightEl){
    const topbar=div('topbar');
    const logo=div('logo-wrap');
    const dot=div('logo-dot');
    const txt=div('');txt.innerHTML=`<div class="logo-txt">NEURO-SCORE</div><div class="logo-sub">${sub}</div>`;
    logo.append(dot,txt); topbar.appendChild(logo);
    if(rightEl) topbar.appendChild(rightEl);
    return topbar;
  }

  // ── SHARED VIEW ──
  if(S.view==='shared'&&S.sharedData){
    app.appendChild(makeTopbar('Острый ишемический инсульт · AIS 2026'));
    const card=div('card');
    const body=div('card-body au');body.id='card-body';
    body.appendChild(renderDecision(S.sharedData.dec,S.sharedData.ans,true));
    card.appendChild(body);app.appendChild(card);return;
  }

  // ── HISTORY VIEW ──
  if(S.view==='history'){
    const hb=btn('tab','← Назад',()=>showQuiz());hb.style.cssText='padding:6px 14px;font-size:12px;';
    app.appendChild(makeTopbar('История пациентов',hb));
    const card=div('card');
    const body=div('card-body au');body.id='card-body';body.appendChild(renderHistoryView());
    card.appendChild(body);app.appendChild(card);return;
  }

  // ── RESULT VIEW ──
  if(S.view==='result'&&S.decision){
    const hb=btn('tab','📋 История',()=>showHistory());hb.style.cssText='padding:6px 14px;font-size:12px;';
    app.appendChild(makeTopbar('Рекомендация сформирована',hb));
    const card=div('card');
    const body=div('card-body au');body.id='card-body';body.appendChild(renderDecision(S.decision,S.answers,false));
    card.appendChild(body);app.appendChild(card);return;
  }

  // ── QUIZ VIEW ──
  const steps=buildSteps(S.answers);
  const step=steps[S.stepIdx];
  const prog=(S.stepIdx/steps.length)*100;

  const dots=div('step-dots');
  steps.forEach((_,i)=>{
    const sd=div('sdot');
    sd.style.width=i===S.stepIdx?'20px':'5px';
    sd.style.background=i<=S.stepIdx?'var(--teal)':'var(--border2)';
    if(i===S.stepIdx)sd.style.boxShadow='0 0 6px var(--teal)';
    dots.appendChild(sd);
  });
  app.appendChild(makeTopbar(`Шаг ${S.stepIdx+1} из ${steps.length}`,dots));

  const card=div('card');
  const pb=div('progress-bar');const pf=div('progress-fill');pf.style.width=prog+'%';pb.appendChild(pf);card.appendChild(pb);

  const body=div('card-body au');body.id='card-body';body.style.transition='opacity .18s,transform .18s';

  const qbadge=div('q-badge');qbadge.innerHTML=`<span class="q-num">Q${S.stepIdx+1}</span>`;
  const qtitle=div('q-title');qtitle.textContent=step.title;
  const qhint=div('q-hint');qhint.textContent=step.hint;
  body.append(qbadge,qtitle,qhint);

  let inputEl=null;
  switch(step.type){
    case 'meta':      inputEl=renderMeta();       break;
    case 'onset':     inputEl=renderOnset();      break;
    case 'bmi':       inputEl=renderBMI();        break;
    case 'comorbid':  inputEl=renderComorbid();   break;
    case 'onco':      inputEl=renderOnco();       break;
    case 'binary':    inputEl=renderBinary(step); break;
    case 'nihss':     inputEl=renderNIHSS();      break;
    case 'bp':        inputEl=renderBP();         break;
    case 'glucose':   inputEl=renderGlucose();    break;
    case 'checklist': inputEl=renderChecklist();  break;
    case 'aspects':   inputEl=renderAspects();    break;
  }
  if(inputEl) body.appendChild(inputEl);

  const ok=canProceed(step,S.answers);
  const nav=div('nav-row');
  if(S.stepIdx>0) nav.appendChild(btn('btn-back','← Назад',()=>goBack()));
  const isLast=S.stepIdx===steps.length-1;
  const nx=btn('btn-next',isLast?'Получить рекомендацию →':'Далее →',()=>goNext());
  if(!ok)nx.disabled=true;
  nav.appendChild(nx);
  body.appendChild(nav);

  if(S.stepIdx===0){
    const hint=div('');hint.style.cssText='text-align:center;margin-top:14px;';
    const hb=btn('tab','📋 История пациентов',()=>showHistory());hb.style.cssText='font-size:12px;padding:7px 16px;';
    hint.appendChild(hb);body.appendChild(hint);
  }

  card.appendChild(body);app.appendChild(card);

  const fn=div('footer-note');fn.textContent='AHA/ASA 2026 · По материалам Prabhakaran et al. · Neuro-Score';
  app.appendChild(fn);

  requestAnimationFrame(()=>{const b=document.getElementById('card-body');if(b){b.style.opacity='1';b.style.transform='translateY(0)';}});
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
function init(){
  const shared=decodeFromHash();
  if(shared&&shared.ans&&shared.dec){S.sharedData=shared;S.view='shared';}
  S.history=loadHistory();
  render();
}
window.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
